name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18'

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Lint, build y test de código fuente
  # ──────────────────────────────────────────────
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install & build service-usuarios
        working-directory: ./service-usuarios
        run: npm install && npm run build

      - name: Install & build service-expedientes
        working-directory: ./service-expedientes
        run: npm install && npm run build

      - name: Install & build service-mantenedores
        working-directory: ./service-mantenedores
        run: npm install && npm run build

      - name: Install & build service-tareas
        working-directory: ./service-tareas
        run: npm install && npm run build

      - name: Install & build frontend
        working-directory: ./frontend
        run: npm install && npm run build

  # ──────────────────────────────────────────────
  # JOB 2: Build y push de imágenes Docker
  # Solo en push a main
  # ──────────────────────────────────────────────
  docker-push:
    runs-on: ubuntu-latest
    needs: lint-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push service-usuarios
        uses: docker/build-push-action@v5
        with:
          context: ./service-usuarios
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gps-service-usuarios:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gps-service-usuarios:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push service-expedientes
        uses: docker/build-push-action@v5
        with:
          context: ./service-expedientes
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gps-service-expedientes:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gps-service-expedientes:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push service-mantenedores
        uses: docker/build-push-action@v5
        with:
          context: ./service-mantenedores
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gps-service-mantenedores:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gps-service-mantenedores:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push service-tareas
        uses: docker/build-push-action@v5
        with:
          context: ./service-tareas
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gps-service-tareas:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gps-service-tareas:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gps-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gps-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # JOB 3: Deploy en servidor vía SSH
  # Solo en push a main, después del push de imágenes
  # ──────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: docker-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            cd /home/cristianjimenez2201/ProyectoGPS_JimenezAguileraToro
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "Deploy completado: $(date)"