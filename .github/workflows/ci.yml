name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install service-usuarios dependencies
        working-directory: ./service-usuarios
        run: npm install

      - name: Install service-expedientes dependencies
        working-directory: ./service-expedientes
        run: npm install

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Lint service-usuarios
        working-directory: ./service-usuarios
        run: npm run lint || true

      - name: Lint service-expedientes
        working-directory: ./service-expedientes
        run: npm run lint || true

      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint || true

      - name: Build service-usuarios
        working-directory: ./service-usuarios
        run: npm run build

      - name: Build service-expedientes
        working-directory: ./service-expedientes
        run: npm run build

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build service-usuarios image
        uses: docker/build-push-action@v5
        with:
          context: ./service-usuarios
          push: false
          tags: gps-service-usuarios:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build service-expedientes image
        uses: docker/build-push-action@v5
        with:
          context: ./service-expedientes
          push: false
          tags: gps-service-expedientes:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: gps-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push service-usuarios
        uses: docker/build-push-action@v5
        with:
          context: ./service-usuarios
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gps-service-usuarios:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gps-service-usuarios:${{ github.sha }}

      - name: Build and Push service-expedientes
        uses: docker/build-push-action@v5
        with:
          context: ./service-expedientes
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gps-service-expedientes:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gps-service-expedientes:${{ github.sha }}

      - name: Build and Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gps-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gps-frontend:${{ github.sha }}