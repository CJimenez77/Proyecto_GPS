version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gps_postgres
    environment:
      POSTGRES_DB: gps_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gps-network

  service-usuarios:
    build:
      context: ./service-usuarios
      dockerfile: Dockerfile
    container_name: gps_service_usuarios
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gps_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: dev-secret-key
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gps-network

  service-expedientes:
    build:
      context: ./service-expedientes
      dockerfile: Dockerfile
    container_name: gps_service_expedientes
    environment:
      PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gps_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: dev-secret-key
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gps-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gps_frontend
    ports:
      - "80:80"
    environment:
      VITE_API_USUARIOS: http://service-usuarios:3001
      VITE_API_EXPEDIENTES: http://service-expedientes:3002
    depends_on:
      - service-usuarios
      - service-expedientes
    networks:
      - gps-network

networks:
  gps-network:
    driver: bridge

volumes:
  postgres_data: